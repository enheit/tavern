name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-test:
    name: web-test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r build
      # Chromium for the app project's vitest browser-mode tests.
      - run: pnpm --filter tavern-app exec playwright install --with-deps chromium
      # Test + coverage gates enforced from S2.1: worker lines >=85% (worker
      # vitest.config threshold). App lines >=70% flips on at S3.1 when app code
      # + component tests land (app coverage is ~12% now; no threshold yet).
      - run: pnpm -r test:cov

  rust-test:
    name: rust-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macos pinned to macos-15 (not macos-latest): the bleeding-edge macos-latest image
        # (Xcode 26.5 / clang 21) intermittently lacks clang_rt.osx at the path webrtc-sys probes
        # via `cc --print-search-dirs`, so linking libwebrtc flaked (passed run 1, failed run 2 on
        # identical code). A pinned image keeps the toolchain layout stable. See progress.md S4.1.
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        # libglib2.0-dev: webrtc-sys needs glib/gobject/gio headers to build libwebrtc.
        # libasound2-dev: cpal's ALSA backend. Both are required now that the libwebrtc-backed
        # tavern-engine is a workspace member (S4.1 — cargo test/clippy/llvm-cov build it here).
        run: |
          sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev libasound2-dev clang lld
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Protocol types in sync (ts-rs → git diff)
        if: runner.os == 'Linux'
        # §1: protocol types are defined once in crates/protocol and ts-rs-
        # generated into worker + app. Regenerate and fail if the committed TS
        # drifted from the Rust source.
        run: |
          TS_RS_EXPORT_DIR=../../worker/src/protocol cargo test -p tavern-protocol --quiet
          TS_RS_EXPORT_DIR=../../app/src/lib/protocol cargo test -p tavern-protocol --quiet
          git diff --exit-code worker/src/protocol app/src/lib/protocol
      - name: Coverage (ubuntu only)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: cargo llvm-cov (crates lines >=70%, device/GUI glue excluded)
        if: runner.os == 'Linux'
        # Enforced from S2.1 (PLAN §1 Coverage: Rust crates >=70%). Excluded, all
        # 0%-covered non-unit-testable glue validated elsewhere: the src-tauri GUI
        # shell (S0.2), and the engine's device/PeerConnection/live-SFU orchestration
        # (engine.rs, audio.rs) — exercised end-to-end at S4.3 (P6), not by unit tests.
        # The engine's testable core (apm/mixer/pipeline/remote/signaling/state) is
        # covered here and locally on macOS (S4.1: 95% lines on the core).
        run: cargo llvm-cov --workspace --summary-only --ignore-filename-regex 'src-tauri|crates/engine/src/(engine|audio)\.rs' --fail-under-lines 70

  bundle:
    name: bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      # Red until S0.2 wires up the Tauri shell.
      - run: pnpm tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: tavern-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: ignore
