name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-test:
    name: web-test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r build
      # Test + coverage gates (worker lines >=85%, app lines >=70%) enforced from S2.1.
      - run: pnpm -r test

  rust-test:
    name: rust-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Coverage (ubuntu only)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: cargo llvm-cov (measure only until S2.1)
        if: runner.os == 'Linux'
        # Coverage enforcement flips on at S2.1 (see PLAN §1 + S0.3). Until then this
        # step only measures; the ≥70% Rust gate (with src-tauri shell excluded) is
        # added at S2.1.
        run: cargo llvm-cov --workspace --summary-only

  bundle:
    name: bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      # Red until S0.2 wires up the Tauri shell.
      - run: pnpm tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: tavern-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: ignore
