name: ci
on:
  pull_request:
  push:
    branches: [feat/electron, main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @tavern/app's i18n is compiled from messages/ (src/paraglide is generated + gitignored),
      # so it must be generated before typecheck/test/build (S4.2).
      - run: pnpm -F @tavern/app exec paraglide-js compile --project ./project.inlang --outdir ./src/paraglide --strategy localStorage baseLocale --emit-ts-declarations
      - run: pnpm lint
      - run: pnpm check:i18n
      - run: '! grep -rn "@radix-ui" app/src app/package.json'
      - run: '! grep -rn "@base-ui-components" app'
      - run: test -f .mcp.json && grep -q '"shadcn"' .mcp.json
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
      - run: node scripts/check-fr-traceability.mjs
