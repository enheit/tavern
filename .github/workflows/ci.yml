name: ci
on:
  pull_request:
  push:
    branches: [feat/electron, main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # reads packageManager from package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @tavern/app's i18n is compiled from messages/ (src/paraglide is generated + gitignored),
      # so it must be generated before typecheck/test/build (S4.2).
      - run: pnpm -F @tavern/app exec paraglide-js compile --project ./project.inlang --outdir ./src/paraglide --strategy localStorage baseLocale --emit-ts-declarations
      - run: pnpm lint
      - run: pnpm check:i18n
      - run: '! grep -rn "@radix-ui" app/src app/package.json'
      - run: '! grep -rn "@base-ui-components" app'
      - run: test -f .mcp.json && grep -q '"shadcn"' .mcp.json
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test:coverage
      # The DO WebSocket suite runs in its own serial pool-workers project (PLAN §10) — it is not
      # part of any package's test:coverage, so gate it explicitly (S12.4 audit).
      - run: pnpm -F @tavern/worker run test:ws
      - run: pnpm build
      - run: node scripts/check-fr-traceability.mjs

  # PR e2e (S4.4, PLAN §10/§11): mocked-SFU-free smoke against the real local wrangler-dev + Vite
  # stack. The worker's assets binding needs app/dist to exist to boot, and register needs a migrated
  # local D1 + a dev auth secret — all prepared before Playwright starts the webServers (globalSetup
  # runs AFTER the webServer, so prep must precede `playwright test`).
  e2e-web:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @tavern/app exec paraglide-js compile --project ./project.inlang --outdir ./src/paraglide --strategy localStorage baseLocale --emit-ts-declarations
      - run: pnpm -F @tavern/app build
      - run: cp worker/.dev.vars.example worker/.dev.vars
      - run: pnpm -F @tavern/worker run migrate:local
      - run: pnpm -F @tavern/e2e exec playwright install --with-deps chromium
      # The @realtime specs (streams-realtime, voice-realtime) need the real Cloudflare Realtime SFU —
      # they run only in nightly.yml's web-realtime project. --grep-invert @realtime keeps the PR web
      # job on the mock SFU (§10 hermeticity split). The `web` project also grep-inverts them, so this
      # is belt-and-suspenders + the greppable job-invocation marker S8.5's DoD asserts.
      - run: pnpm -F @tavern/e2e test --project=web --grep-invert @realtime
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-web
          path: e2e/playwright-report
          retention-days: 7

  e2e-desktop:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @tavern/app exec paraglide-js compile --project ./project.inlang --outdir ./src/paraglide --strategy localStorage baseLocale --emit-ts-declarations
      - run: pnpm -F @tavern/app build
      - run: pnpm -F @tavern/desktop build
      - run: cp worker/.dev.vars.example worker/.dev.vars
      - run: pnpm -F @tavern/worker run migrate:local
      # --with-deps chromium also installs xvfb + the shared Chromium system libs Electron needs.
      - run: pnpm -F @tavern/e2e exec playwright install --with-deps chromium
      - run: xvfb-run --auto-servernum -- pnpm -F @tavern/e2e test --project=desktop
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-desktop
          path: e2e/playwright-report
          retention-days: 7

  package-check:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix: { os: [macos-latest, windows-latest, ubuntu-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @tavern/shared build && pnpm -F @tavern/app build && pnpm -F @tavern/desktop build
      # Unsigned packaging proof: full installer targets, no publish, no notarization
      # (release.yml owns signing; CSC auto-discovery off so the mac runner can't grab a
      # random keychain cert).
      - run: cd desktop && pnpm exec electron-builder --publish never --config.mac.notarize=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
