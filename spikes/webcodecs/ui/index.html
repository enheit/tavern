<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>WebCodecs P3 probe</title>
<style>
  body { font-family: -apple-system, ui-monospace, monospace; background:#0d0d10; color:#e6e6e6; margin:0; padding:12px; }
  h1 { font-size:14px; margin:0 0 8px; }
  #status { font-size:13px; color:#8fd; margin-bottom:6px; }
  #log { white-space:pre-wrap; font-size:11px; color:#bbb; margin-bottom:8px; }
  canvas { background:#000; border:1px solid #222; image-rendering:pixelated; }
  #grid { display:flex; flex-wrap:wrap; gap:2px; margin-top:6px; }
</style>
</head>
<body>
  <h1>Tavern S1.5 — WebCodecs decode probe (P3)</h1>
  <div id="status">starting…</div>
  <div id="log"></div>
  <canvas id="big" width="320" height="180"></canvas>
  <div id="grid"></div>
<script>
const { invoke, Channel } = window.__TAURI__.core;
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const log = (m) => { logEl.textContent += m + "\n"; };
const setStatus = (m) => { statusEl.textContent = m; };

function toArrayBuffer(msg) {
  if (msg instanceof ArrayBuffer) return msg;
  if (ArrayBuffer.isView(msg)) return msg.buffer.slice(msg.byteOffset, msg.byteOffset + msg.byteLength);
  if (Array.isArray(msg)) return new Uint8Array(msg).buffer;
  if (msg && msg.data !== undefined) return toArrayBuffer(msg.data);
  throw new Error("unknown channel msg: " + Object.prototype.toString.call(msg));
}

function waitUntil(pred, timeoutMs) {
  return new Promise((resolve, reject) => {
    const t0 = performance.now();
    (function poll() {
      if (pred()) return resolve();
      if (performance.now() - t0 > timeoutMs) return reject(new Error("waitUntil timeout"));
      setTimeout(poll, 20);
    })();
  });
}

async function pullFrames(kind) {
  const frames = [];
  const ch = new Channel();
  ch.onmessage = (msg) => { frames.push(toArrayBuffer(msg)); };
  const n = await invoke('probe_frames', { kind, channel: ch });
  await waitUntil(() => frames.length >= n, 8000);
  log(`pulled ${kind}: ${frames.length} frames`);
  return frames;
}

// VP8: bit 0 of the first byte of the frame tag is the frame type (0 = keyframe).
const isKey = (buf) => (new Uint8Array(buf, 0, 1)[0] & 1) === 0;

// Decode `target` frames (looping `frames`) through one VideoDecoder → canvas.
// Returns { decoded, secs, fps }. Uses a self-scheduling pump (no reliance on the
// optional `dequeue` event) that keeps the decode queue bounded so throughput, not
// queue growth, is what we measure.
function runDecoder(frames, target, canvas, codec) {
  return new Promise((resolve, reject) => {
    const ctx = canvas.getContext('2d');
    let fed = 0, decoded = 0, t0 = 0, done = false;
    const dec = new VideoDecoder({
      output: (frame) => {
        decoded++;
        try { ctx.drawImage(frame, 0, 0, canvas.width, canvas.height); } catch (_) {}
        frame.close();
      },
      error: (e) => { if (!done) { done = true; reject(e); } }
    });
    dec.configure({ codec });
    function pump() {
      if (done) return;
      while (dec.decodeQueueSize < 24 && fed < target) {
        const buf = frames[fed % frames.length];
        dec.decode(new EncodedVideoChunk({ type: isKey(buf) ? 'key' : 'delta', timestamp: fed * 3333, data: buf }));
        if (t0 === 0) t0 = performance.now();
        fed++;
      }
      if (fed < target) { setTimeout(pump, 0); return; }
      dec.flush().then(() => {
        if (done) return;
        done = true;
        const secs = (performance.now() - t0) / 1000;
        try { dec.close(); } catch (_) {}
        resolve({ decoded, secs, fps: decoded / secs });
      }).catch((e) => { if (!done) { done = true; reject(e); } });
    }
    pump();
  });
}

async function finish(results) {
  try { await invoke('save_results', { json: JSON.stringify(results, null, 2) }); } catch (e) { log('save failed: ' + e); }
  setTimeout(() => { invoke('exit_app'); }, 800);
}

async function main() {
  const results = { platform: navigator.userAgent, isConfigSupported: {}, tests: {}, gate: {} };

  // 1. Per-codec support (the per-OS/codec table input).
  for (const [name, codec] of [['vp8', 'vp8'], ['vp9', 'vp09.00.10.08'], ['h264', 'avc1.42E01F']]) {
    try {
      const s = await VideoDecoder.isConfigSupported({ codec });
      results.isConfigSupported[name] = { codec, supported: !!s.supported };
    } catch (e) {
      results.isConfigSupported[name] = { codec, supported: false, error: String(e) };
    }
  }
  log('isConfigSupported: ' + JSON.stringify(results.isConfigSupported));

  // 2. VP8 gate — dumps are VP8. If unsupported, §1 rule flips codec to H264 (needs S1.4 re-run).
  if (!results.isConfigSupported.vp8.supported) {
    results.decision = 'VP8_UNSUPPORTED';
    results.note = 'This webview\'s WebCodecs cannot decode VP8. Per PLAN §1, codec flips to H264 (avc1.42E01F). S1.4 dumps are VP8, so an H264 publish+tap re-run is required to measure P3 fps for H264.';
    log('VP8 UNSUPPORTED → ' + results.note);
    setStatus('VP8 unsupported — see webcodecs.json');
    return finish(results);
  }

  // 3. Pull dumps once; the 9 parallel 360p decoders share the same frame array.
  setStatus('pulling dumps…');
  const f1080 = await pullFrames('1080p');
  const f360 = await pullFrames('360p');

  // 4. Test A: 1×1080p30, looped ≥900 frames → ≥28 fps.
  setStatus('decoding 1×1080p…');
  const target1080 = Math.max(900, f1080.length * 3);
  const a = await runDecoder(f1080, target1080, document.getElementById('big'), 'vp8');
  results.tests.single1080p = a;
  log(`1×1080p: ${a.fps.toFixed(1)} fps (${a.decoded}/${a.secs.toFixed(2)}s)`);

  // 5. Test B: 9×360p30 parallel, each looped ≥900 frames → ≥25 fps each.
  setStatus('decoding 9×360p parallel…');
  const grid = document.getElementById('grid');
  const canvases = [];
  for (let i = 0; i < 9; i++) {
    const c = document.createElement('canvas');
    c.width = 160; c.height = 90;
    grid.appendChild(c);
    canvases.push(c);
  }
  const target360 = Math.max(900, f360.length * 3);
  const bs = await Promise.all(canvases.map((c) => runDecoder(f360, target360, c, 'vp8')));
  results.tests.parallel360p = bs.map((b) => ({ fps: b.fps, decoded: b.decoded, secs: b.secs }));
  bs.forEach((b, i) => log(`360p[${i}]: ${b.fps.toFixed(1)} fps`));

  // 6. P3 gate.
  const pass1080 = a.fps >= 28;
  const min360 = Math.min(...bs.map((b) => b.fps));
  const pass360 = min360 >= 25;
  results.gate = {
    single1080pFps: a.fps, pass1080,
    min360pFps: min360, pass360,
    P3: pass1080 && pass360
  };
  results.decision = (pass1080 && pass360) ? 'VP8' : 'VP8_P3_FAILED';
  log(`P3: 1080p ${a.fps.toFixed(1)} (${pass1080 ? 'PASS' : 'FAIL'}), min360 ${min360.toFixed(1)} (${pass360 ? 'PASS' : 'FAIL'}) → ${results.gate.P3 ? 'PASS' : 'FAIL'}`);
  setStatus('DONE — P3 ' + (results.gate.P3 ? 'PASS' : 'FAIL'));
  return finish(results);
}

main().catch((e) => {
  const msg = (e && e.stack) || String(e);
  log('FATAL: ' + msg);
  setStatus('ERROR');
  finish({ error: msg });
});
</script>
</body>
</html>
